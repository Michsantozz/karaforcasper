# CasperAgent — DEV MODE (app roda no HOST com `pnpm dev`, hot reload).
#
# Este arquivo sobe SÓ os services de infra, isolados do stack de produção
# (docker-compose.yml). Portas host deslocadas pra não colidir com o prod:
#   db    → 5433  (prod usa rede interna; casper-postgres avulso usa 5434)
#   minio → 9210 (API) / 9211 (console)   (prod usa 9200/9201)
# O Inngest roda via CLI no host (`pnpm dev:inngest`), sem keys — não precisa
# de container aqui.
#
# Uso:
#   pnpm dev:up                                         # sobe infra + migra dev db
#   pnpm dev                                            # app :3001 hot reload
#   pnpm dev:inngest                                    # inngest dev (crons/workflows)
#   pnpm dev:down                                       # derruba infra
#
# :3001 (não :3000) porque evolution_frontend ocupa :3000 no host.
#
# .env.local já aponta DATABASE_URL/S3_* pra estas portas (localhost:5433/9210).

name: casperagent-dev

services:
  db:
    # pgvector/pgvector:pg17: Postgres 17 + extensão `vector` (Mastra semantic
    # recall). A imagem oficial postgres:17-alpine não traz pgvector.
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: casper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-casper}
      POSTGRES_DB: casperagent
    ports:
      - "5433:5432" # exposto no host pro `pnpm dev`/`pnpm db:migrate`
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casper -d casperagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Object storage S3-compatível (uploads de imagem/attachments do chat).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9210:9000" # API S3
      - "9211:9001" # console web
    volumes:
      - miniodata-dev:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Job one-shot: cria o bucket com leitura pública (imagens servidas por URL
  # direta ao modelo de visão). Encerra após configurar.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-casper-uploads}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$S3_BUCKET &&
      mc anonymous set download local/$$S3_BUCKET
      "
    restart: "no"

volumes:
  pgdata-dev:
  miniodata-dev:
