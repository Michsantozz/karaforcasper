# pnpm v11 lê settings daqui (não mais do campo "pnpm" do package.json).
#
# Aprova apenas as deps que precisam rodar build script nativo/runtime real.
# pnpm 10+ bloqueia lifecycle scripts por default e sai com erro sob
# --frozen-lockfile quando algum fica ignorado (ERR_PNPM_IGNORED_BUILDS),
# quebrando o CI. Drivers de teste (edge/gecko), agent-browser e msw ficam
# ignorados de propósito — não são necessários pro build/runtime.
onlyBuiltDependencies:
  - "@reown/appkit"
  - bigint-buffer
  - bufferutil
  - esbuild
  - protobufjs
  - sharp
  - unrs-resolver
  - utf-8-validate
