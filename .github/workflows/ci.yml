name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate de qualidade: typecheck + lint (boundary rules) + testes que rodam
  # sem serviços externos. integration/e2e ficam de fora (precisam DB/APIs reais).
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # respeita packageManager: pnpm@11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # engines.node >= 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:unit
      - run: pnpm test:component

  # Valida que a imagem de produção builda (standalone, multi-stage). Não publica.
  docker:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: casperagent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=ci-placeholder-not-a-real-secret
            GIT_HASH=${{ github.sha }}
