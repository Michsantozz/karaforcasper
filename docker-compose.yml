# CasperAgent — stack de produção self-host.
#   db      — Postgres (better-auth, Mastra memory, drizzle).
#   migrate — roda as migrations e sai (job one-shot; app espera terminar).
#   inngest — servidor Inngest: descobre /api/inngest e dispara o cron autônomo.
#   app     — Next.js standalone (server.js).
#
# Uso:
#   cp .env.example .env   # e preencha os [SECRET]
#   docker compose up -d --build
#
# Secrets vêm do .env (env_file). Em prod real, prefira Docker/K8s secrets.

name: casperagent

# Log rotation compartilhado — sem isto os logs json-file crescem infinito e
# enchem o disco do host (failure mode clássico de self-host). `max-file` só
# tem efeito se `max-size` estiver setado (doc do driver json-file).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: casper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: casperagent
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Postgres é o gargalo do stack — folga maior. read_only NÃO (escreve no
    # datadir + sockets em /var/run). cap_drop ALL também NÃO: o entrypoint
    # oficial roda como root, faz chmod no datadir e su-exec pro user postgres —
    # dropar todas as caps mata o boot ("chmod: Operation not permitted").
    # Testado: só no-new-privileges é compatível (accepting connections).
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casper -d casperagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Job one-shot: aplica migrations e encerra. App só sobe depois deste completar.
  migrate:
    build:
      context: .
      target: builder
    logging: *default-logging
    env_file: .env
    environment:
      DATABASE_URL: postgres://casper:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/casperagent
    command: ["pnpm", "db:migrate"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # MinIO: object storage S3-compatível (uploads de imagem/attachments do chat).
  # console em :9001, API S3 em :9000. Bucket criado pelo job `minio-init`.
  minio:
    # Tag pinada (não `latest`) — reprodutibilidade entre deploys. Atualize
    # conscientemente. RELEASE.2025-04-08 é uma release estável recente.
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    restart: unless-stopped
    logging: *default-logging
    command: ["server", "/data", "--console-address", ":9001"]
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    # Host ports offset to 92xx: 9000/9001 are commonly taken by another local
    # MinIO. Container stays on 9000/9001 internally (compose network + init use
    # those); only the host mapping is shifted.
    ports:
      - "9200:9000"
      - "9201:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Job one-shot: cria o bucket e o deixa com leitura pública (imagens servidas
  # por URL direta pro modelo de visão). Encerra após configurar.
  minio-init:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    logging: *default-logging
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      S3_BUCKET: ${S3_BUCKET:-casper-uploads}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$S3_BUCKET &&
      mc anonymous set download local/$$S3_BUCKET
      "
    restart: "no"

  # Servidor Inngest: registra o endpoint /api/inngest do app e executa o cron
  # do loop autônomo + workflows. Sem ele, o agente NÃO é autônomo.
  inngest:
    # Tag pinada (não `latest`). Atualize conscientemente ao subir versão.
    image: inngest/inngest:v1.5.3
    restart: unless-stopped
    logging: *default-logging
    command: ["inngest", "start"]
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      INNGEST_DEV: "0"
      # `inngest start` (prod) authenticates apps with these. MUST match the keys
      # the app/SDK uses below, or event delivery + step callbacks fail closed.
      # Both are [SECRET] — supply via .env (see .env.example).
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:?set INNGEST_EVENT_KEY in .env}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:?set INNGEST_SIGNING_KEY in .env}
    ports:
      - "8288:8288"
    depends_on:
      app:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
      args:
        # Server Actions encryption key precisa estar presente no BUILD.
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
        GIT_HASH: ${GIT_HASH:-}
    restart: unless-stopped
    logging: *default-logging
    # Next standalone + Mastra/LLM buffers. read_only NÃO — Next escreve em
    # .next/cache em runtime. cap_drop ALL é seguro (server HTTP não precisa
    # de cap privilegiada); non-root já vem do Dockerfile (USER node).
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file: .env
    environment:
      # NOTE (RLS hardening): meeting_records + user_calendars use FORCE ROW LEVEL
      # SECURITY, so isolation holds even when the app connects as the table
      # owner. For defense-in-depth the app SHOULD connect as the non-owner
      # `app_user` role (see drizzle/0008 + docs/rls.md); until that role is
      # provisioned with LOGIN in prod, `casper` is used and a boot guard warns.
      DATABASE_URL: postgres://casper:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/casperagent
      # LLM guardrails (prompt-injection block + PII redact) on the chat agent.
      # Off by default (LLM cost/latency); turn on for untrusted-input prod.
      ENABLE_LLM_GUARDRAILS: ${ENABLE_LLM_GUARDRAILS:-false}
      INNGEST_BASE_URL: http://inngest:8288
      INNGEST_DEV: "0"
      # Same keys as the inngest service — the SDK signs event sends + step
      # callbacks with these. Mismatch/absence in prod (INNGEST_DEV=0) breaks the
      # app<->inngest handshake. Supplied via .env (see .env.example).
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:?set INNGEST_EVENT_KEY in .env}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:?set INNGEST_SIGNING_KEY in .env}
      # Storage S3 (MinIO). Endpoint interno via rede do compose; a URL pública
      # (S3_PUBLIC_URL) é o que vai no image part servido ao browser/modelo.
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-casper-uploads}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9200/casper-uploads}
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "3000:3000"
    # Readiness real (pinga Postgres). Node inline — slim não garante curl/wget.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health?ready=1').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

volumes:
  pgdata:
  miniodata:
